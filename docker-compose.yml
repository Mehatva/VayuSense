version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: vayusense_db
    environment:
      POSTGRES_USER: ${DB_USER:-vayusense}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vayusense123}
      POSTGRES_DB: ${DB_NAME:-vayusense}
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vayusense_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  timescale_data:
